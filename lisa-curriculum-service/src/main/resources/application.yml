spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: lisa-curriculum-service
  h2:
    console:
      enabled: ${SPRING_H2_CONSOLE_ENABLED:false}
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.lisa: DEBUG

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true    # bật nút "Try it out" mặc định

lms:
  security:
    jwt:
      secret: ${JWT_SECRET:MISSING_JWT_SECRET}
      issuer: ${JWT_ISSUER:MISSING_JWT_ISSUER}
      audience: ${JWT_AUDIENCE:MISSING_JWT_AUDIENCE}
    role-id-map:
      "${LMS_ROLE_ID_USER:1}": "ROLE_USER"     # role_id=1 LUCY   → người dùng thường
      "${LMS_ROLE_ID_MENTOR:2}": "ROLE_MENTOR"  # role_id=2 PRO    → có thể dạy học
      "${LMS_ROLE_ID_CREATOR:3}": "ROLE_CREATOR" # role_id=3 SUPER  → quyền cao nhất
  session:
    end-session-on-last-sublevel: ${LMS_END_SESSION_ON_LAST_SUBLEVEL:false}
    auto-switch-scan-interval-ms: ${LMS_AUTO_SWITCH_SCAN_INTERVAL_MS:60000}
    realtime-session-join-event: ${REALTIME_SESSION_JOIN_EVENT:session.join}
  integration:
    user-service-base-url: ${USER_SERVICE_BASE_URL:MISSING_USER_SERVICE_BASE_URL}
    realtime-service-base-url: ${REALTIME_SERVICE_BASE_URL:MISSING_REALTIME_SERVICE_BASE_URL}
    realtime-socket-url: ${REALTIME_SOCKET_URL:MISSING_REALTIME_SOCKET_URL}

mimo:
  base-url: ${MIMO_BASE_URL:}
  api-key: ${MIMO_API_KEY:}
  model: ${MIMO_MODEL:MiMo-V2-Flash}
  timeout-ms: ${MIMO_TIMEOUT_MS:20000}
  max-tokens: ${MIMO_MAX_TOKENS:500}
