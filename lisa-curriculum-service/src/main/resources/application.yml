spring:
  application:
    name: lisa-curriculum-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:lisadb;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.lisa: DEBUG

# ── Swagger / OpenAPI ────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true    # bật nút "Try it out" mặc định

# ── LMS Security / JWT Configuration ─────────────────────────
lms:
  security:
    jwt:
      secret: ${JWT_SECRET:8vOvSRycvAEBW/EDujcErz8UmfN70KGZZGKqfSuX7goQ1db0sPBwU1ICfogYXuy8QdOKRih5DEYOvMq1PL4Acg==}
      issuer: ${JWT_ISSUER:ProjectLucy.API}
      audience: ${JWT_AUDIENCE:ProjectLucy.Client}
    role-id-map:
      "1": "ROLE_USER"
      "2": "ROLE_MENTOR"
      "3": "ROLE_CREATOR"
      "4": "ROLE_ADMIN"

# ── LMS Session Configuration ───────────────────────────────
lms:
  session:
    end-session-on-last-sublevel: ${END_SESSION_ON_LAST_SUBLEVEL:false}
